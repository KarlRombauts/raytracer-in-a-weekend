# Netlify configuration for the threaded-WebAssembly viewer.
#
# The load-bearing part is the [[headers]] block: this app uses `SharedArrayBuffer`
# (multithreaded rendering via wasm-bindgen-rayon), which the browser only enables
# on a *cross-origin isolated* page — i.e. served with COOP + COEP. GitHub Pages
# can't set headers, which is why the demo is on Netlify.
#
# ── Deploying ────────────────────────────────────────────────────────────────
# This is a nightly + `-Z build-std` threaded-wasm build, which is awkward to run
# in Netlify's CI. So the demo is deployed from a locally-built bundle:
#
#     just web                                 # builds ./dist (nightly + build-std)
#     netlify deploy --prod --dir dist         # uploads the prebuilt dir
#
# netlify.toml is read from the repo root, so the headers below apply to a --dir
# deploy. No [build] command here on purpose — otherwise `netlify deploy` runs it
# locally. (To wire up continuous deploy from git instead, add a build command
# that installs nightly + rust-src + trunk and runs the build-std trunk build.)

[build]
  publish = "dist"

# Cross-origin isolation — required for SharedArrayBuffer / threaded wasm.
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Embedder-Policy = "require-corp"
